<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Me Up! - Illuminous Yoda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet">
<form id="contactForm" action="https://formspree.io/f/xzdoapoq" method="POST"></form></head>
<body>
    <header>
        <h1>Hit Me Up!</h1>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Bio</a></li>
                <li><a href="contact.html">Hit Me Up!</a></li>
                <li><a href="https://www.instagram.com/hollywood.yoda/" target="_blank">Instagram</a></li>
                <li><a href="https://www.imdb.com/name/nm16759674/bio/?ref_=nm_ov_bio_sm" target="_blank">IMDB</a></li>
                <li><a href="https://www.youtube.com/@illuminous.visions" target="_blank">YouTube</a></li>
            </ul>
        </nav>
    </header>

    <section class="about">
        <h2>Get In Touch</h2>
        <p>Collaborations, casting inquiries, press, or just a hello — I read every message personally.</p>

        <!-- SUCCESS MESSAGE -->
        <div id="successMsg" style="display:none;">
            <p><strong>Message received!</strong> I'll be in touch soon — stay illuminous.</p>
        </div>

        <!-- CONTACT FORM -->
        <!-- ⚠️ REPLACE "YOUR_FORM_ID" with your Formspree form ID -->
        <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

            <p>
                <label for="name">Your Name</label><br>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </p>

            <p>
                <label for="email">Your Email</label><br>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </p>

            <p>
                <label for="reason">Reason for reaching out</label><br>
                <select id="reason" name="reason">
                    <option value="">— Select one —</option>
                    <option value="collaboration">Collaboration / Project</option>
                    <option value="casting">Casting Inquiry</option>
                    <option value="press">Press / Interview</option>
                    <option value="fan">Fan Mail</option>
                    <option value="other">Other</option>
                </select>
            </p>

            <p>
                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="6" placeholder="Tell me what you're working on..." required></textarea>
            </p>

            <p>
                <button type="submit">Send It!</button>
            </p>

        </form>
    </section>

    <footer>
        <p>&copy; 2025 Hollywood Yoda. All rights reserved.</p>
    </footer>

    <script>
        const form = document.getElementById('contactForm');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const btn = form.querySelector('button[type="submit"]');
            btn.textContent = 'Sending…';
            btn.disabled = true;

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    form.style.display = 'none';
                    successMsg.style.display = 'block';
                } else {
                    btn.textContent = 'Send It!';
                    btn.disabled = false;
                    alert('Something went wrong. Please try again.');
                }
            } catch {
                btn.textContent = 'Send It!';
                btn.disabled = false;
                alert('Network error. Please check your connection and try again.');
            }
        });
    </script>

</body>
</html>
